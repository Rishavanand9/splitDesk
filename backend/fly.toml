# Fly.io config for the API. The app must exist before this is used —
# see docs/deployment-github-actions.md for the one-time setup.
app = "splitdesk-api"
primary_region = "bom"

[build]

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_URLS = "http://+:8082"
  TESSDATA_PREFIX = "/usr/share/tesseract-ocr/5/tessdata"

[http_service]
  internal_port = 8082
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
