server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 127.0.0.11 is Docker's internal DNS resolver.
    # "valid=30s" caches the resolved IP for 30 seconds.
    # Using resolver + a $variable forces nginx to resolve "api" at request time
    # instead of at startup — fixes "host not found in upstream" when containers
    # start in parallel and the API isn't DNS-registered yet.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # SPA fallback — serves index.html for any path not matching a real file
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/ to the backend container
    location /api/ {
        set $upstream http://api:8082;
        proxy_pass $upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }
}
